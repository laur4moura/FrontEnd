<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .corsim {
        color: green;
    }
    .cornao {
        color: red;
    }
    </style>
    

</head>
<body>
    <input type="text" onblur="getElements(this.value)" placeholder="Digite o nome da classe">
    <button onclick="getElements();">Pegar Elementos</button>
    <ul>
        <li class="corsim">Item1</li>
        <li class="cornao">Item2</li>
        <li class="corsim">Item3</li>
        <li class="cornao">Item4</li>
    </ul>

    <script>
        function getElements(nomeClasse = "cornao"){
            let elementos = document.getElementsByClassName(nomeClasse);

            console.log(elementos);

            if (elementos.length === 0) {
               console.log("Não existem elementos para montrar");
               return false
            }


            for (let i = 0; i < elementos.length; i++) {
                
                console.log( elementos[i].textContent);
            }
        }
    </script>
</body>
</html>
